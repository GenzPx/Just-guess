<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUST GUESS - Word Guessing Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Navbar -->
        <nav class="navbar" id="navbar">
            <div class="nav-brand">
                <i class="fas fa-gamepad"></i>
                <span>Just Guess</span>
            </div>
            <button class="hamburger" id="hamburger" aria-label="Menu">
                <i class="fas fa-bars"></i>
            </button>
            <div class="nav-menu" id="navMenu">
                <a href="#/home" class="nav-link" data-page="home">
                    <i class="fas fa-home"></i>
                    <span data-i18n="nav.home">Home</span>
                </a>
                <a href="#/profile" class="nav-link" data-page="profile">
                    <i class="fas fa-user"></i>
                    <span data-i18n="nav.profile">Profile</span>
                </a>
                <a href="#/settings" class="nav-link" data-page="settings">
                    <i class="fas fa-cog"></i>
                    <span data-i18n="nav.settings">Settings</span>
                </a>
                <a href="#/how-to-play" class="nav-link" data-page="how-to-play">
                    <i class="fas fa-question-circle"></i>
                    <span data-i18n="nav.howToPlay">How To Play</span>
                </a>
                <div class="nav-controls">
                    <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">
                        <i class="fas fa-moon" id="themeIcon"></i>
                    </button>
                    <button class="lang-toggle" id="langToggle">
                        <span id="langText">EN</span>
                    </button>
                    <button class="logout-btn" id="logoutBtn" style="display: none;">
                        <i class="fas fa-sign-out-alt"></i>
                        <span data-i18n="nav.logout">Logout</span>
                    </button>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <!-- Pages will be rendered here -->
        </main>

        <!-- Modal Container -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal" id="modal">
                <div class="modal-header">
                    <h3 class="modal-title" id="modalTitle">Modal Title</h3>
                    <button class="modal-close" id="modalClose">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- Modal content -->
                </div>
                <div class="modal-footer" id="modalFooter">
                    <!-- Modal actions -->
                </div>
            </div>
        </div>

        <!-- Toast Container -->
        <div class="toast-container" id="toastContainer"></div>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p data-i18n="loading">Loading...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
    </html>
